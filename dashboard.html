<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seireitei — Terminal de Comando Central</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="umcss.css">
</head>
<body class="bg-black text-white min-h-screen flex flex-col items-center justify-between antialiased">
    
    <div id="toast-container"></div>

    <div id="app" class="w-full max-w-5xl flex-1 flex flex-col justify-center px-4 py-8 md:py-12">
        
        <header class="flex flex-col-reverse md:block text-center mb-8 md:mb-12 relative select-none">
            
            <div class="mx-auto mb-6 md:mb-0 md:absolute md:top-0 md:right-0 relative inline-block z-50">
                
                <button id="menu-btn" onclick="toggleMenu()" class="border border-zinc-800 text-zinc-400 px-5 py-2 text-xs font-semibold tracking-[0.2em] hover:border-zinc-200 hover:bg-zinc-100 hover:text-black transition-all duration-300 uppercase shadow-md w-full md:w-auto">
                    SENKAIMON
                </button>

                <div id="settings-menu" style="display: none;" class="absolute top-full mt-2 left-1/2 -translate-x-1/2 md:left-auto md:right-0 md:translate-x-0 border border-zinc-800/80 backdrop-blur-md bg-zinc-950/95 p-5 w-64 shadow-2xl shadow-black text-left">
                    <p id="user-display" class="text-zinc-500 text-[10px] tracking-widest uppercase mb-4 font-mono">// Identidade Carregada</p>
                    
                    <input id="input-nome" type="text" placeholder="Alterar Assinatura de Reiatsu..." class="w-full bg-zinc-900/60 p-2.5 text-xs mb-3 border border-zinc-800 text-zinc-300 placeholder-zinc-600 focus:outline-none focus:border-zinc-500 transition-all font-mono">
                    
                    <button id="btn-salvar" class="w-full border border-zinc-800 text-zinc-400 py-2 text-xs font-semibold tracking-widest hover:border-zinc-200 hover:bg-zinc-100 hover:text-black transition-all duration-300 uppercase">
                        SINCRONIZAR
                    </button>
                    <button id="btn-logout" class="w-full border border-zinc-900 text-zinc-600 py-2 text-xs font-semibold tracking-widest mt-4 hover:border-red-900/50 hover:text-red-400 transition-all duration-300 uppercase">
                        FECHAR PORTAL
                    </button>
                </div>
                
            </div>

            <p class="text-[10px] tracking-[0.5em] text-zinc-600 uppercase mb-3 font-mono pt-2 md:pt-0">// PAINEL DE CONTROLE</p>
            <h1 class="font-serif text-4xl md:text-5xl tracking-[0.3em] text-zinc-200 uppercase">SOUL SOCIETY</h1>
            <p id="user-email-header" class="text-zinc-500 text-[11px] tracking-[0.15em] mt-3 uppercase font-mono"></p>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-2 gap-6 items-stretch">
            
            <section class="flex flex-col md:h-[420px] h-[380px] p-6 md:p-8 border border-zinc-800/60 backdrop-blur-md bg-gradient-to-b from-zinc-900/30 to-black/60 shadow-xl shadow-black/40">
                <h2 class="font-serif text-xs tracking-[0.25em] text-zinc-400 mb-4 uppercase border-b border-zinc-900 pb-3 select-none">
                    Denreishinki // Conexão
                </h2>
                
                <div id="chat-box" class="flex-1 overflow-y-auto mb-4 text-xs text-zinc-400 font-mono space-y-3 pr-2 scrollbar-thin"></div>
                
                <div class="flex gap-2">
                    <input id="input-chat" type="text" placeholder="Transmitir mensagem para a Tenente..." class="flex-1 bg-transparent border-b border-zinc-800 p-2 text-xs text-zinc-300 placeholder-zinc-600 focus:outline-none focus:border-zinc-500 transition-all">
                    <button id="btn-perguntar" class="border border-zinc-800 text-zinc-400 px-5 text-xs font-semibold tracking-widest hover:border-zinc-200 hover:bg-zinc-100 hover:text-black transition-all duration-300 uppercase">
                        ENVIAR
                    </button>
                </div>
            </section>

            <section class="flex flex-col md:h-[420px] h-[380px] p-6 md:p-8 border border-zinc-800/60 backdrop-blur-md bg-gradient-to-b from-zinc-900/30 to-black/60 shadow-xl shadow-black/40">
                <h2 class="font-serif text-xs tracking-[0.25em] text-zinc-400 mb-4 uppercase border-b border-zinc-900 pb-3 select-none">
                    Cofre da Central 46 — Registros
                </h2>
                
                <div class="space-y-3 mb-4">
                    <input id="input-titulo" type="text" placeholder="Classificação do Alvo (ex: Senkaimon)..." class="w-full bg-transparent border-b border-zinc-800 p-2 text-xs text-zinc-300 placeholder-zinc-600 focus:outline-none focus:border-zinc-500 transition-all">
                    <input id="input-conteudo" type="text" placeholder="Dados Restritos (Conteúdo criptografado)..." class="w-full bg-transparent border-b border-zinc-800 p-2 text-xs text-zinc-300 placeholder-zinc-600 focus:outline-none focus:border-zinc-500 transition-all">
                    <button id="btn-salvar-segredo" class="w-full border border-zinc-800 text-zinc-400 py-2.5 text-xs font-semibold tracking-[0.2em] hover:border-zinc-200 hover:bg-zinc-100 hover:text-black transition-all duration-300 uppercase">
                        SELAR REGISTRO
                    </button>
                </div>
                
                <div id="lista-segredos" class="flex-1 overflow-y-auto text-xs text-zinc-500 font-mono space-y-2 pr-2 scrollbar-thin"></div>
            </section>

        </main>
    </div>

    <footer class="w-full pb-6 text-center font-mono text-[8px] tracking-[0.3em] text-zinc-700 uppercase select-none">
        CRYPT_ENC // SECTOR_46_APPROVED // MOTA_013
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="dashboard.js" defer></script>
</body>
</html>
